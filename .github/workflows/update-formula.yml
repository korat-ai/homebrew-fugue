name: Update formula

on:
  repository_dispatch:
    types: [new-release]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute checksums
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          VERSION_BARE=${VERSION#v}
          echo "VERSION_BARE=$VERSION_BARE" >> $GITHUB_ENV

          for RID in osx-arm64 linux-x64; do
            ARCHIVE="fugue-${VERSION_BARE}-${RID}.tar.gz"
            URL="https://github.com/korat-ai/fugue/releases/download/${VERSION}/${ARCHIVE}"
            curl -fsSL "$URL" -o "$ARCHIVE"
            VAR="SHA_${RID//-/_}"
            echo "$VAR=$(sha256sum $ARCHIVE | awk '{print $1}')" >> $GITHUB_ENV
          done

      - name: Patch formula
        run: |
          python3 - <<'PY'
          import re, os

          version = os.environ["VERSION_BARE"]
          sha_arm = os.environ["SHA_osx_arm64"]
          sha_x64 = os.environ["SHA_linux_x64"]

          text = open("Formula/fugue.rb").read()
          text = re.sub(r'version "[^"]*"', f'version "{version}"', text)
          shas  = iter([sha_arm, sha_x64])
          text  = re.sub(r'sha256 "[a-f0-9]{64}"',
                         lambda _: f'sha256 "{next(shas)}"', text)
          open("Formula/fugue.rb", "w").write(text)
          PY

      - name: Commit and push to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/fugue.rb
          git commit -m "fugue ${{ env.VERSION_BARE }}"
          git push origin main
